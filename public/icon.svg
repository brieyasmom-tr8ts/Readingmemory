<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8843a"/>
      <stop offset="100%" stop-color="#a06830"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book body -->
  <g transform="translate(256,270)">
    <!-- Left page -->
    <path d="M-12,-120 C-12,-120 -110,-130 -130,-105 L-130,95 C-110,75 -12,85 -12,85 Z" fill="#faf7f2" opacity="0.95"/>
    <!-- Right page -->
    <path d="M12,-120 C12,-120 110,-130 130,-105 L130,95 C110,75 12,85 12,85 Z" fill="#ede6d8" opacity="0.95"/>
    <!-- Spine -->
    <rect x="-12" y="-120" width="24" height="205" rx="4" fill="#f0ead8"/>
    <!-- Page lines left -->
    <line x1="-100" y1="-60" x2="-30" y2="-55" stroke="#c8843a" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <line x1="-105" y1="-35" x2="-30" y2="-30" stroke="#c8843a" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="-110" y1="-10" x2="-30" y2="-5" stroke="#c8843a" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="-112" y1="15" x2="-30" y2="20" stroke="#c8843a" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <!-- Page lines right -->
    <line x1="100" y1="-60" x2="30" y2="-55" stroke="#7c5c3e" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="105" y1="-35" x2="30" y2="-30" stroke="#7c5c3e" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <line x1="110" y1="-10" x2="30" y2="-5" stroke="#7c5c3e" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
    <!-- Heart bookmark -->
    <path d="M0,-145 C-8,-165 -28,-165 -28,-148 C-28,-135 0,-118 0,-118 C0,-118 28,-135 28,-148 C28,-165 8,-165 0,-145Z" fill="#b0605a"/>
  </g>
</svg>
