<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#c8843a">
<title>ReadThat.me</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1a1410;--ink-soft:#3d3028;--sepia:#7c5c3e;--amber:#c8843a;--amber-lt:#e8a85a;--cream:#f7f2eb;--cream-dk:#ede6d8;--paper:#faf7f2;--paper-dk:#f0ead8;--sage:#6b8c6b;--rose:#b0605a;--fog:rgba(26,20,16,0.08);--fog-md:rgba(26,20,16,0.15);--shadow-sm:0 2px 8px rgba(26,20,16,0.10);--shadow-md:0 6px 24px rgba(26,20,16,0.14);--shadow-lg:0 16px 48px rgba(26,20,16,0.18);--radius:14px;--radius-sm:8px;--transition:0.22s cubic-bezier(0.34,1.1,0.64,1);--font-display:'Playfair Display',Georgia,serif;--font-body:'Lato',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,textarea,select,button{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
img{max-width:100%;display:block}
#app{min-height:100vh;display:flex;flex-direction:column}
.view{display:none;flex-direction:column;min-height:100vh;animation:fadeUp .3s ease}
.view.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.topbar{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:1px solid var(--fog-md);padding:14px 20px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(8px)}
.topbar h1{font-family:var(--font-display);font-size:1.35rem;font-weight:600;color:var(--ink);flex:1}
.topbar-sub{font-family:var(--font-display);font-size:1.1rem;font-weight:600;color:var(--ink);flex:1;font-style:italic}
.btn-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--ink-soft);background:var(--fog);transition:background var(--transition),transform var(--transition);flex-shrink:0}
.btn-icon:active{transform:scale(.92);background:var(--fog-md)}
.btn-primary{background:var(--ink);color:var(--cream);padding:13px 28px;border-radius:50px;font-weight:700;font-size:.95rem;letter-spacing:.04em;text-transform:uppercase;box-shadow:var(--shadow-md);transition:transform var(--transition),box-shadow var(--transition);display:inline-flex;align-items:center;gap:8px}
.btn-primary:active{transform:scale(.96);box-shadow:var(--shadow-sm)}
.btn-primary.amber{background:var(--amber);color:#fff}
.btn-primary.sage{background:var(--sage);color:#fff}
.btn-primary.rose{background:var(--rose);color:#fff}
.btn-primary:disabled{opacity:.5;pointer-events:none}
.btn-secondary{border:1.5px solid var(--fog-md);color:var(--ink-soft);padding:10px 22px;border-radius:50px;font-weight:400;font-size:.9rem;background:var(--paper);transition:background var(--transition);display:inline-flex;align-items:center;gap:6px}
.btn-secondary:active{background:var(--cream-dk)}
.btn-danger{background:var(--rose);color:#fff;padding:10px 22px;border-radius:50px;font-weight:700;font-size:.85rem;letter-spacing:.04em;text-transform:uppercase}
.btn-link{color:var(--amber);font-weight:700;font-size:.9rem;text-decoration:underline}
.fab{position:fixed;bottom:28px;right:24px;z-index:200;width:60px;height:60px;border-radius:50%;background:var(--ink);color:var(--cream);font-size:1.8rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);transition:transform var(--transition)}
.fab:active{transform:scale(.92) rotate(15deg)}
.stats-strip{display:flex;gap:16px;padding:12px 20px;background:var(--cream);border-bottom:1px solid var(--fog)}
.stat-chip{font-size:.82rem;color:var(--sepia);font-weight:400}
.stat-chip strong{color:var(--ink);font-weight:700;font-size:1.1rem}
.filter-tabs{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-tab{padding:7px 16px;border-radius:50px;font-size:.82rem;font-weight:700;background:var(--cream);color:var(--sepia);white-space:nowrap;transition:all .18s;border:1.5px solid transparent}
.filter-tab.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.search-sort-bar{display:flex;gap:8px;padding:0 20px 8px;align-items:center}
.search-sort-bar .search-input{flex:1}
.search-input{background:var(--cream);border:1.5px solid var(--cream-dk);border-radius:50px;padding:10px 18px;font-size:.92rem;color:var(--ink);outline:none;transition:border-color .18s}
.search-input:focus{border-color:var(--amber);background:#fff}
.sort-btn{padding:8px 14px;border-radius:50px;font-size:.75rem;font-weight:700;background:var(--cream);color:var(--sepia);border:1.5px solid var(--cream-dk);white-space:nowrap}
.sort-btn:active{background:var(--cream-dk)}
.book-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px}
.book-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform var(--transition);position:relative}
.book-card:active{transform:scale(.97)}
.book-card-cover{width:100%;aspect-ratio:2/3;background:var(--cream-dk);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.book-card-cover img{width:100%;height:100%;object-fit:cover}
.book-card-cover .no-cover{font-family:var(--font-display);font-size:2.2rem;color:var(--sepia);opacity:.4}
.book-card-badge{position:absolute;top:8px;left:8px;padding:3px 9px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.badge-reading{background:var(--amber);color:#fff}
.badge-finished{background:var(--sage);color:#fff}
.badge-want{background:var(--fog-md);color:var(--ink-soft)}
.book-card-cat{position:absolute;top:8px;right:8px;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;background:rgba(0,0,0,.45);color:#fff;letter-spacing:.04em;text-transform:uppercase}
.book-card-info{padding:10px 10px 12px}
.book-card-title{font-family:var(--font-display);font-size:.88rem;font-weight:600;line-height:1.3;margin-bottom:2px;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-card-author{font-size:.72rem;color:var(--sepia);margin-bottom:4px}
.book-card-meta{display:flex;align-items:center;gap:6px}
.book-card-mood{font-size:1rem}
.book-card-rating{font-size:.7rem;color:var(--amber);font-weight:700}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;text-align:center;color:var(--sepia)}
.empty-state .icon{font-size:3.5rem;opacity:.5}
.empty-state p{font-family:var(--font-display);font-style:italic;font-size:1.1rem;max-width:240px;line-height:1.6}
.form-content{padding:24px 20px 100px;flex:1;display:flex;flex-direction:column;gap:20px}
.field-group{display:flex;flex-direction:column;gap:6px}
.field-label{font-size:.78rem;font-weight:700;color:var(--sepia);text-transform:uppercase;letter-spacing:.07em}
.field-input{background:var(--cream);border:1.5px solid var(--cream-dk);border-radius:var(--radius-sm);padding:12px 14px;font-size:1rem;color:var(--ink);outline:none;transition:border-color .18s;width:100%}
.field-input:focus{border-color:var(--amber);background:#fff}
textarea.field-input{resize:none;min-height:72px;line-height:1.5}
.save-indicator{font-size:.72rem;color:var(--sage);font-style:italic;min-height:16px;transition:opacity .3s}
.cover-picker{width:140px;height:200px;margin:0 auto;border-radius:var(--radius);border:2px dashed var(--amber);background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;overflow:hidden;position:relative;transition:background var(--transition)}
.cover-picker:active{background:var(--cream-dk)}
.cover-picker img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cover-picker .placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.cover-picker .placeholder span{font-size:1.8rem}
.cover-picker .placeholder p{font-size:.78rem;color:var(--sepia);text-align:center;line-height:1.4}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:10px 16px;border-radius:50px;border:1.5px solid var(--fog-md);font-size:.82rem;font-weight:700;text-align:center;cursor:pointer;color:var(--ink-soft);background:var(--paper);transition:all .18s;white-space:nowrap}
.pill.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.pill.sm{padding:7px 12px;font-size:.75rem}
.pill-add{border-style:dashed;border-color:var(--amber);color:var(--amber)}
.suggest-wrap{position:relative}
.suggest-list{position:absolute;top:100%;left:0;right:0;z-index:50;background:#fff;border:1.5px solid var(--cream-dk);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:220px;overflow-y:auto;display:none;box-shadow:var(--shadow-md)}
.suggest-list.open{display:block}
.suggest-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--fog);display:flex;gap:10px;align-items:center}
.suggest-item:active{background:var(--cream)}
.suggest-item-cover{width:32px;height:46px;border-radius:4px;background:var(--cream-dk);overflow:hidden;flex-shrink:0}
.suggest-item-cover img{width:100%;height:100%;object-fit:cover}
.suggest-item-text{flex:1;min-width:0}
.suggest-item-title{font-size:.88rem;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suggest-item-author{font-size:.75rem;color:var(--sepia)}
.suggest-dismiss{padding:6px 12px;font-size:.75rem;color:var(--sepia);text-align:center;cursor:pointer;border-top:1px solid var(--fog)}
.suggest-dismiss:active{background:var(--cream)}
.dup-warning{background:#fff3e0;border:1.5px solid var(--amber);border-radius:var(--radius-sm);padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.dup-warning p{font-size:.88rem;color:var(--ink-soft)}
.dup-warning strong{color:var(--ink)}
/* Crop modal */
.crop-overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(26,20,16,.95);flex-direction:column;align-items:center;justify-content:center;padding:20px}
.crop-overlay.open{display:flex}
.crop-area{position:relative;max-width:90vw;max-height:60vh;touch-action:none;user-select:none;-webkit-user-select:none}
.crop-area img{display:block;max-width:90vw;max-height:60vh;pointer-events:none}
.crop-box{position:absolute;border:2px solid var(--amber);box-shadow:0 0 0 9999px rgba(0,0,0,.6);cursor:move;touch-action:none}
.crop-handle{position:absolute;width:24px;height:24px;background:var(--amber);border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:2;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.crop-handle.tl{top:0;left:0;cursor:nwse-resize}
.crop-handle.tr{top:0;right:0;transform:translate(50%,-50%);cursor:nesw-resize}
.crop-handle.bl{bottom:0;left:0;transform:translate(-50%,50%);cursor:nesw-resize}
.crop-handle.br{bottom:0;right:0;transform:translate(50%,50%);cursor:nwse-resize}
.crop-actions{display:flex;gap:12px;margin-top:20px}
.crop-hint{color:rgba(255,255,255,.5);font-size:.78rem;margin-top:10px;text-align:center}
/* Detail */
.hero{width:100%;background:var(--ink);padding:28px 20px 24px;display:flex;gap:18px;align-items:flex-end;position:relative}
.hero-cover{width:100px;height:148px;border-radius:8px;overflow:hidden;box-shadow:var(--shadow-lg);flex-shrink:0;background:var(--ink-soft);display:flex;align-items:center;justify-content:center}
.hero-cover img{width:100%;height:100%;object-fit:cover}
.hero-cover .no-cover{font-size:2.5rem}
.hero-info{flex:1}
.hero-title{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--cream);line-height:1.3;margin-bottom:4px}
.hero-author{font-size:.9rem;color:var(--amber-lt);margin-bottom:4px}
.hero-cat{font-size:.72rem;color:rgba(255,255,255,.6);margin-bottom:4px}
.hero-dates{font-size:.68rem;color:rgba(255,255,255,.4);margin-bottom:8px}
.hero-status-row{display:flex;gap:8px;flex-wrap:wrap}
.hero-status-row .pill{font-size:.72rem;padding:6px 12px;color:rgba(255,255,255,.6);background:transparent;border-color:rgba(255,255,255,.2)}
.hero-status-row .pill.active{background:var(--amber);color:#fff;border-color:var(--amber)}
.detail-content{padding:0 0 100px;flex:1}
.section{padding:20px 20px 16px;border-bottom:1px solid var(--fog)}
.section-title{font-family:var(--font-display);font-size:1rem;font-weight:600;font-style:italic;color:var(--sepia);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--fog-md)}
.meta-row{display:flex;align-items:center;justify-content:space-between;background:var(--cream);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px}
.meta-label{font-size:.88rem;color:var(--ink-soft)}
.toggle-switch{position:relative;width:46px;height:26px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--fog-md);border-radius:13px;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;bottom:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle-switch input:checked+.toggle-slider{background:var(--sage)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}
.rec-by{font-size:.82rem;color:var(--sepia);font-style:italic;padding:4px 16px}
/* Rating */
.rating-row{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px}
.rating-label{font-size:.88rem;color:var(--ink-soft);flex-shrink:0}
.rating-dots{display:flex;gap:4px;flex:1;justify-content:center}
.rating-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--fog-md);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--sepia);transition:all .18s;cursor:pointer}
.rating-dot.filled{background:var(--amber);border-color:var(--amber);color:#fff}
.rating-dot.high{background:var(--sage);border-color:var(--sage);color:#fff}
.rating-value{font-size:1.1rem;font-weight:700;color:var(--ink);width:28px;text-align:center}
.recommend-banner{background:linear-gradient(135deg,var(--sage),#5a7a5a);color:#fff;border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:8px;font-size:.85rem;line-height:1.4}
/* Source */
.source-row{display:flex;gap:6px;flex-wrap:wrap}
.source-pill{padding:7px 12px;border-radius:50px;font-size:.75rem;font-weight:700;border:1.5px solid var(--fog-md);color:var(--ink-soft);background:var(--paper);cursor:pointer;transition:all .18s}
.source-pill.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
/* Journey */
.journey-list{display:flex;flex-direction:column;gap:10px}
.entry-card{background:var(--cream);border-radius:var(--radius-sm);padding:12px 14px;display:flex;gap:12px;align-items:flex-start;position:relative}
.entry-emoji{font-size:1.6rem;flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-position{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:2px}
.entry-note{font-size:.88rem;color:var(--ink-soft);line-height:1.5}
.entry-time{font-size:.72rem;color:var(--sepia);margin-top:4px}
.entry-delete{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--rose);background:transparent;transition:background .18s}
.entry-delete:active{background:rgba(176,96,90,.15)}
.notes-block{display:flex;flex-direction:column;gap:14px}
.field-with-mic{position:relative}
.field-with-mic textarea{padding-right:44px}
.mic-btn{position:absolute;right:8px;bottom:12px;width:32px;height:32px;border-radius:50%;background:var(--fog);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--sepia);transition:all .18s}
.mic-btn:active,.mic-btn.recording{background:var(--rose);color:#fff}
.mic-btn.recording{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.position-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.emoji-btn{aspect-ratio:1;border-radius:var(--radius-sm);background:var(--cream);font-size:1.6rem;display:flex;align-items:center;justify-content:center;border:2px solid transparent;transition:transform var(--transition),border-color .18s}
.emoji-btn:active{transform:scale(.92)}
.emoji-btn.selected{border-color:var(--amber);background:#fffbe8}
.ai-box{border-radius:var(--radius);overflow:hidden;border:1.5px solid var(--amber);margin-bottom:12px}
.ai-box-header{background:var(--amber);color:#fff;padding:10px 16px;font-size:.82rem;font-weight:700;letter-spacing:.05em}
.ai-content{padding:14px 16px;background:#fffdf8}
.ai-section-title{font-family:var(--font-display);font-size:.9rem;font-weight:600;color:var(--ink);margin:12px 0 4px}
.ai-section-title:first-child{margin-top:0}
.ai-section-body{font-size:.88rem;color:var(--ink-soft);line-height:1.6}
.ai-section-body ul{padding-left:18px}
.ai-section-body li{margin-bottom:2px}
.ai-loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px;color:var(--sepia);font-style:italic;font-size:.92rem}
.spinner{width:28px;height:28px;border:2.5px solid var(--cream-dk);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-edit textarea{width:100%;background:var(--cream);border:1.5px solid var(--cream-dk);border-radius:var(--radius-sm);padding:10px 12px;font-size:.88rem;color:var(--ink);resize:none;outline:none;min-height:220px;line-height:1.6;transition:border-color .18s}
.ai-edit textarea:focus{border-color:var(--amber)}
.stat-cards{display:flex;flex-direction:column;gap:12px;padding:20px}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
.stat-card-label{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sepia);margin-bottom:4px}
.stat-card-value{font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--ink)}
.stat-card-sub{font-size:.82rem;color:var(--sepia);margin-top:2px}
.cat-breakdown{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.cat-row{display:flex;align-items:center;gap:12px}
.cat-bar-wrap{flex:1;height:8px;background:var(--cream-dk);border-radius:4px;overflow:hidden}
.cat-bar{height:100%;border-radius:4px;transition:width .4s ease}
.cat-label{font-size:.82rem;color:var(--ink-soft);width:120px;flex-shrink:0}
.cat-count{font-size:.82rem;font-weight:700;color:var(--ink);width:24px;text-align:right}
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(26,20,16,.65);backdrop-filter:blur(4px);align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--paper);width:100%;border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 40px;animation:slideUp .3s cubic-bezier(.34,1.1,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--fog-md);border-radius:2px;margin:0 auto 20px}
.share-preview{background:var(--cream);border-radius:var(--radius);padding:20px;margin-bottom:20px;display:flex;gap:16px;align-items:flex-start}
.share-cover{width:70px;height:100px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--cream-dk);display:flex;align-items:center;justify-content:center}
.share-cover img{width:100%;height:100%;object-fit:cover}
.share-text{flex:1}
.share-title{font-family:var(--font-display);font-size:1.05rem;font-weight:700;margin-bottom:2px}
.share-author{font-size:.82rem;color:var(--sepia);margin-bottom:8px}
.share-moods{font-size:1.2rem;margin-bottom:6px}
.share-tag{display:inline-block;background:var(--ink);color:var(--cream);padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.share-actions{display:flex;gap:10px;flex-direction:column}
.share-btn{display:flex;align-items:center;gap:12px;background:var(--cream);border-radius:var(--radius-sm);padding:14px 16px;font-size:.95rem;color:var(--ink);transition:background var(--transition)}
.share-btn:active{background:var(--cream-dk)}
.share-btn .icon{font-size:1.3rem}
.confirm-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(26,20,16,.65);align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--paper);border-radius:var(--radius);padding:24px;margin:20px;max-width:340px;width:100%;box-shadow:var(--shadow-lg)}
.confirm-box p{font-size:.95rem;color:var(--ink);margin-bottom:16px;line-height:1.5}
.confirm-actions{display:flex;gap:10px;justify-content:flex-end}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);padding:10px 20px;border-radius:50px;font-size:.88rem;opacity:0;transition:all .3s;z-index:900;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.auth-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.auth-logo{margin-bottom:8px}
.auth-title{font-family:var(--font-display);font-size:1.8rem;font-weight:700;color:var(--ink);margin-bottom:4px}
.auth-sub{font-size:.92rem;color:var(--sepia);margin-bottom:32px}
.auth-form{width:100%;max-width:320px;display:flex;flex-direction:column;gap:14px}
.auth-form .field-input{text-align:center;border-radius:50px;padding:14px 20px}
.auth-error{font-size:.82rem;color:var(--rose);min-height:20px}
.auth-switch{margin-top:16px;font-size:.88rem;color:var(--sepia)}
.auth-bar{padding:8px 20px;background:var(--cream);border-bottom:1px solid var(--fog);font-size:.75rem;color:var(--sage);display:flex;align-items:center;justify-content:space-between}
.auth-bar button{font-size:.75rem;color:var(--rose);font-weight:700}
@supports(padding:max(0px)){.fab{bottom:max(28px,env(safe-area-inset-bottom) + 16px)}}

/* Desktop responsive */
@media(min-width:600px){
  #app,.auth-screen{max-width:480px;margin:0 auto}
  .topbar,.stats-strip,.filter-tabs,.search-sort-bar,.auth-bar{max-width:480px}
  .fab{right:calc(50% - 216px)}
  .modal-sheet{max-width:480px;margin:0 auto}
}
@media(min-width:900px){
  #app,.auth-screen{max-width:600px}
  .book-grid{grid-template-columns:repeat(3,1fr)}
  .fab{right:calc(50% - 276px)}
  .modal-sheet{max-width:600px}
}
</style>
</head>
<body>

<div id="auth-screen" class="auth-screen" style="display:none">
  <div class="auth-logo"><img src="/logo.png" alt="ReadThat.me" style="width:360px;max-width:95%;height:auto;margin-bottom:24px"></div>
  <div class="auth-sub">Track your reads. Remember how they felt.</div>
  <div class="auth-form">
    <input type="text" class="field-input" id="auth-name" placeholder="Your name" style="display:none">
    <input type="email" class="field-input" id="auth-email" placeholder="Email">
    <input type="password" class="field-input" id="auth-pass" placeholder="Password">
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()" style="align-self:center">Log In</button>
    <div class="auth-switch"><span id="auth-switch-text">No account?</span> <button class="btn-link" id="auth-switch-btn" onclick="toggleAuthMode()">Sign Up</button></div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="view-home" class="view active">
    <div class="topbar"><h1 style="display:flex;align-items:center;gap:8px"><img src="/logo.png" alt="" height="32" style="border-radius:4px"> ReadThat.me</h1><button class="btn-icon" onclick="showView('stats')">&#x1f4ca;</button></div>
    <div class="auth-bar" id="user-bar"><span id="user-name-display"></span><button onclick="doLogout()">Log out</button></div>
    <div class="stats-strip" id="home-stats"></div>
    <div class="search-sort-bar">
      <input type="text" class="search-input" id="home-search" placeholder="Search books..." oninput="renderHome()">
      <button class="sort-btn" id="sort-btn" onclick="cycleSort()">Recent</button>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-f="all" onclick="setFilter(this)">All</button>
      <button class="filter-tab" data-f="reading" onclick="setFilter(this)">Reading</button>
      <button class="filter-tab" data-f="finished" onclick="setFilter(this)">Finished</button>
      <button class="filter-tab" data-f="want" onclick="setFilter(this)">Want to Read</button>
    </div>
    <div id="home-content" style="flex:1">
      <div class="empty-state" id="empty-state" style="display:none"><div class="icon">&#x1f4d6;</div><p>Your reading journey starts here.</p></div>
      <div class="book-grid" id="book-grid"></div>
    </div>
    <button class="fab" onclick="openAddView()">&#xff0b;</button>
  </div>

  <div id="view-add" class="view">
    <div class="topbar"><button class="btn-icon" onclick="showView('home')">&#x2190;</button><span class="topbar-sub">New Book</span></div>
    <div class="form-content">
      <div class="cover-picker" onclick="document.getElementById('cover-input').click()">
        <div class="placeholder" id="cover-placeholder"><span>&#x1f4f7;</span><p>Tap to add<br>cover photo</p></div>
        <img id="cover-preview" src="" alt="" style="display:none">
      </div>
      <input type="file" id="cover-input" accept="image/*" style="display:none" onchange="handleCoverInput(event)">
      <div class="field-group suggest-wrap">
        <label class="field-label">Title</label>
        <input type="text" class="field-input" id="add-title" placeholder="Start typing a book title..." oninput="onTitleInput()" autocomplete="off">
        <div class="suggest-list" id="suggest-list"></div>
        <div id="dup-area"></div>
      </div>
      <div class="field-group"><label class="field-label">Author</label><input type="text" class="field-input" id="add-author" placeholder="Author name"></div>
      <div class="field-group"><label class="field-label">Category</label><div class="pill-row" id="cat-main-row"></div></div>
      <div class="field-group" id="subcat-group" style="display:none"><label class="field-label">Sub-category</label><div class="pill-row" id="cat-sub-row"></div></div>
      <div class="field-group"><label class="field-label">Status</label>
        <div class="pill-row">
          <button class="pill active" data-status="want" onclick="pickAddStatus(this)">Want to Read</button>
          <button class="pill" data-status="reading" onclick="pickAddStatus(this)">Reading</button>
          <button class="pill" data-status="finished" onclick="pickAddStatus(this)">Finished</button>
        </div>
      </div>
      <div class="field-group" id="source-add-group"><label class="field-label">Source</label><div class="source-row" id="add-source-row"></div></div>
      <div class="field-group" id="recby-group"><label class="field-label">Who recommended this?</label><input type="text" class="field-input" id="add-recby" placeholder="Friend's name (optional)"></div>
      <button class="btn-primary" onclick="saveBook()" style="align-self:center;margin-top:8px">Save Book</button>
    </div>
  </div>

  <div id="view-detail" class="view">
    <div class="topbar" style="background:var(--ink);border-color:rgba(255,255,255,.1)">
      <button class="btn-icon" onclick="showView('home')" style="background:rgba(255,255,255,.1);color:var(--cream)">&#x2190;</button>
      <span class="topbar-sub" style="color:var(--cream)">Book Details</span>
      <button class="btn-icon" onclick="openShareModal()" style="background:rgba(255,255,255,.1);color:var(--cream);font-size:1.1rem">&#x2197;</button>
      <button class="btn-icon" onclick="confirmDeleteBook()" style="background:rgba(255,255,255,.1);color:var(--rose);font-size:1rem">&#x1f5d1;</button>
    </div>
    <div class="hero">
      <div class="hero-cover" id="detail-cover"><span class="no-cover">&#x1f4d6;</span></div>
      <div class="hero-info">
        <div class="hero-title" id="detail-title">-</div>
        <div class="hero-author" id="detail-author">-</div>
        <div class="hero-cat" id="detail-cat"></div>
        <div class="hero-dates" id="detail-dates"></div>
        <div class="hero-status-row" id="detail-status-row">
          <button class="pill" data-status="want" onclick="updateStatus(this)">Want</button>
          <button class="pill" data-status="reading" onclick="updateStatus(this)">Reading</button>
          <button class="pill" data-status="finished" onclick="updateStatus(this)">Finished</button>
        </div>
      </div>
    </div>
    <div class="detail-content">
      <div class="section" id="detail-meta-section">
        <div id="rating-area"></div>
        <div id="recommend-banner-area"></div>
        <div class="meta-row">
          <span class="meta-label">I'd recommend this</span>
          <label class="toggle-switch"><input type="checkbox" id="detail-recommend" onchange="saveRecommend()"><span class="toggle-slider"></span></label>
        </div>
        <div class="rec-by" id="detail-recby"></div>
        <div id="detail-source-area" style="margin-top:8px"></div>
      </div>
      <div class="section">
        <div class="section-title">Reading Journey</div>
        <div class="journey-list" id="journey-list"></div>
        <button class="btn-secondary" onclick="showView('entry')" style="margin-top:14px">&#xff0b; Quick Entry</button>
      </div>
      <div class="section">
        <div class="section-title">My Notes</div>
        <div class="notes-block">
          <div class="field-group">
            <label class="field-label">What's this book about?</label>
            <div class="field-with-mic">
              <textarea class="field-input" id="note-about" placeholder="Brief description so you remember later..." rows="3" oninput="saveNotes()"></textarea>
              <button class="mic-btn" onclick="toggleMic('note-about')" title="Voice input">&#x1f399;</button>
            </div>
            <div class="save-indicator" id="save-about"></div>
          </div>
          <div class="field-group" id="final-thoughts-group" style="display:none">
            <label class="field-label">Final Thoughts</label>
            <div class="field-with-mic">
              <textarea class="field-input" id="note-final" placeholder="How did it end for you? Worth it?" rows="3" oninput="saveNotes()"></textarea>
              <button class="mic-btn" onclick="toggleMic('note-final')" title="Voice input">&#x1f399;</button>
            </div>
            <div class="save-indicator" id="save-final"></div>
          </div>
        </div>
      </div>
      <div class="section" id="ai-section" style="display:none">
        <div class="section-title">AI Summary</div>
        <div id="ai-area"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
          <button class="btn-primary amber" id="btn-ai-gen" onclick="generateAI()">Generate My Summary</button>
          <button class="btn-secondary" id="btn-ai-regen" style="display:none" onclick="generateAI()">Regenerate</button>
        </div>
      </div>
    </div>
  </div>

  <div id="view-entry" class="view">
    <div class="topbar"><button class="btn-icon" onclick="showView('detail')">&#x2190;</button><span class="topbar-sub">Quick Entry</span></div>
    <div class="form-content">
      <div class="field-group"><label class="field-label">Where are you in the book?</label>
        <div class="position-grid"><button class="pill" data-pos="beginning" onclick="pickPos(this)">Beginning</button><button class="pill" data-pos="middle" onclick="pickPos(this)">Middle</button><button class="pill" data-pos="end" onclick="pickPos(this)">End</button></div>
      </div>
      <div class="field-group"><label class="field-label">How does it feel?</label>
        <div class="emoji-grid" id="emoji-grid">
          <button class="emoji-btn" data-emoji="&#x1f60d;" onclick="pickEmoji(this)">&#x1f60d;</button>
          <button class="emoji-btn" data-emoji="&#x1f60a;" onclick="pickEmoji(this)">&#x1f60a;</button>
          <button class="emoji-btn" data-emoji="&#x1f914;" onclick="pickEmoji(this)">&#x1f914;</button>
          <button class="emoji-btn" data-emoji="&#x1f610;" onclick="pickEmoji(this)">&#x1f610;</button>
          <button class="emoji-btn" data-emoji="&#x1f634;" onclick="pickEmoji(this)">&#x1f634;</button>
          <button class="emoji-btn" data-emoji="&#x1f62e;" onclick="pickEmoji(this)">&#x1f62e;</button>
          <button class="emoji-btn" data-emoji="&#x1f62d;" onclick="pickEmoji(this)">&#x1f62d;</button>
          <button class="emoji-btn" data-emoji="&#x1f602;" onclick="pickEmoji(this)">&#x1f602;</button>
          <button class="emoji-btn" data-emoji="&#x1f624;" onclick="pickEmoji(this)">&#x1f624;</button>
          <button class="emoji-btn" data-emoji="&#x1f929;" onclick="pickEmoji(this)">&#x1f929;</button>
        </div>
      </div>
      <div class="field-group"><label class="field-label">What's on your mind? <span style="font-weight:400;text-transform:none">(optional)</span></label>
        <div class="field-with-mic">
          <textarea class="field-input" id="entry-note" placeholder="What's happening, what do you think..." rows="3"></textarea>
          <button class="mic-btn" onclick="toggleMic('entry-note')" title="Voice input">&#x1f399;</button>
        </div>
      </div>
      <button class="btn-primary" onclick="saveEntry()" style="align-self:center;margin-top:4px">Save Entry</button>
    </div>
  </div>

  <div id="view-stats" class="view">
    <div class="topbar"><button class="btn-icon" onclick="showView('home')">&#x2190;</button><span class="topbar-sub">My Reading Stats</span></div>
    <div class="stat-cards" id="stats-content"></div>
  </div>
</div>

<div class="modal-overlay" id="share-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-sheet"><div class="modal-handle"></div>
    <div class="share-preview"><div class="share-cover" id="share-cover"><span style="font-size:2rem">&#x1f4d6;</span></div>
      <div class="share-text"><div class="share-title" id="share-title">-</div><div class="share-author" id="share-author">-</div><div class="share-moods" id="share-moods"></div><span class="share-tag" id="share-tag">-</span></div>
    </div>
    <div class="share-actions">
      <button class="share-btn" onclick="copyShare()"><span class="icon">&#x1f4cb;</span> Copy to clipboard</button>
      <button class="share-btn" onclick="nativeShare()"><span class="icon">&#x2197;</span> Share via...</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-modal"><div class="confirm-box"><p id="confirm-msg"></p><div class="confirm-actions"><button class="btn-secondary" onclick="closeConfirm()">Cancel</button><button class="btn-danger" id="confirm-btn">Confirm</button></div></div></div>

<div class="crop-overlay" id="crop-modal">
  <div class="crop-area" id="crop-area">
    <img id="crop-img" src="" alt="">
    <div class="crop-box" id="crop-box">
      <div class="crop-handle tl" data-handle="tl"></div>
      <div class="crop-handle tr" data-handle="tr"></div>
      <div class="crop-handle bl" data-handle="bl"></div>
      <div class="crop-handle br" data-handle="br"></div>
    </div>
  </div>
  <div class="crop-hint">Drag corners to resize, drag inside to move</div>
  <div class="crop-actions">
    <button class="btn-secondary" onclick="cancelCrop()" style="color:#fff;border-color:rgba(255,255,255,.3)">Cancel</button>
    <button class="btn-primary amber" onclick="applyCrop()">Use This</button>
  </div>
</div>

<div id="toast"></div>

<script>
const CATEGORIES={novels:{label:'Novels',color:'var(--amber)',subs:['Fiction','Fantasy','Sci-Fi','Romance','Mystery / Thriller','Historical Fiction','Literary Fiction']},leadership:{label:'Leadership',color:'var(--sage)',subs:['Business','Self-Help','Management','Productivity','Biography']},christian:{label:'Christian Living',color:'#7b68ae',subs:['Devotional','Theology','Bible Study','Spiritual Growth','Marriage & Family']}};
const SOURCES=['Kindle Unlimited','Libby','Purchased','Audible','Library','Borrowed','Other'];
const SORT_OPTIONS=[{key:'recent',label:'Recent'},{key:'alpha',label:'A-Z'},{key:'rating',label:'Rating'},{key:'finished',label:'Date Finished'},{key:'started',label:'Date Started'}];

let books=[],customSubs={},currentBookId=null,currentFilter='all',currentSort='recent',tempCoverURL=null,addStatus='want',addCatMain=null,addCatSub=null,addSource='',entryPos=null,entryEmoji=null,suggestTimer=null,authMode='login',currentUser=null,noteTimer=null;

/* === API === */
async function api(p,o={}){const r=await fetch('/api/'+p,{method:o.method||'GET',headers:o.body?{'Content-Type':'application/json'}:{},body:o.body?JSON.stringify(o.body):undefined,credentials:'same-origin'});const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');return d;}

/* === AUTH === */
function showAuth(){document.getElementById('auth-screen').style.display='flex';document.getElementById('app').style.display='none';}
function showApp(){document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='flex';}
function toggleAuthMode(){authMode=authMode==='login'?'signup':'login';document.getElementById('auth-name').style.display=authMode==='signup'?'':'none';document.getElementById('auth-btn').textContent=authMode==='login'?'Log In':'Sign Up';document.getElementById('auth-switch-text').textContent=authMode==='login'?'No account?':'Already have one?';document.getElementById('auth-switch-btn').textContent=authMode==='login'?'Sign Up':'Log In';document.getElementById('auth-error').textContent='';}
async function doAuth(){const e=document.getElementById('auth-email').value.trim(),p=document.getElementById('auth-pass').value,n=document.getElementById('auth-name').value.trim(),err=document.getElementById('auth-error'),btn=document.getElementById('auth-btn');err.textContent='';if(!e||!p){err.textContent='Email and password required';return;}btn.disabled=true;btn.textContent='Loading...';try{const d=await api(authMode==='login'?'login':'signup',{method:'POST',body:authMode==='signup'?{email:e,password:p,name:n}:{email:e,password:p}});currentUser=d.user;await loadBooks();document.getElementById('user-name-display').textContent=currentUser.name||currentUser.email;showApp();renderHome();}catch(x){err.textContent=x.message;}finally{btn.disabled=false;btn.textContent=authMode==='login'?'Log In':'Sign Up';}}
async function doLogout(){try{await api('logout',{method:'POST'});}catch(x){}currentUser=null;books=[];showAuth();}
async function checkAuth(){try{const d=await api('me');currentUser=d.user;document.getElementById('user-name-display').textContent=currentUser.name||currentUser.email;await loadBooks();showApp();renderHome();}catch(x){showAuth();}}

/* === DATA === */
async function loadBooks(){try{const d=await api('books');books=d.books||[];customSubs=d.customSubs||{};}catch(x){books=[];}}
async function apiSaveBook(b){try{await api('books/'+b.id,{method:'PUT',body:b});}catch(x){try{await api('books',{method:'POST',body:b});}catch(x2){console.warn('save failed',x2);}}}
async function apiDeleteBook(id){try{await api('books/'+id,{method:'DELETE'});}catch(x){}}
async function apiSaveEntry(bid,e){try{await api('entries',{method:'POST',body:{bookId:bid,...e}});}catch(x){}}
async function apiDeleteEntry(id){try{await api('entries?id='+id,{method:'DELETE'});}catch(x){}}

/* === VIEWS === */
function showView(n){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+n).classList.add('active');if(n==='home')renderHome();if(n==='detail')renderDetail();if(n==='stats')renderStats();window.scrollTo(0,0);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function showConfirm(m,fn){document.getElementById('confirm-msg').textContent=m;document.getElementById('confirm-btn').onclick=()=>{closeConfirm();fn();};document.getElementById('confirm-modal').classList.add('open');}
function closeConfirm(){document.getElementById('confirm-modal').classList.remove('open');}

/* === HOME === */
function renderHome(){
  const q=(document.getElementById('home-search').value||'').toLowerCase();
  let f=books.filter(b=>{if(currentFilter!=='all'&&b.status!==currentFilter)return false;if(q&&!b.title.toLowerCase().includes(q)&&!(b.author||'').toLowerCase().includes(q))return false;return true;});
  // Sort
  if(currentSort==='recent')f.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  else if(currentSort==='alpha')f.sort((a,b)=>a.title.localeCompare(b.title));
  else if(currentSort==='rating')f.sort((a,b)=>(b.rating||0)-(a.rating||0));
  else if(currentSort==='finished')f.sort((a,b)=>(b.finishedAt||0)-(a.finishedAt||0));
  else if(currentSort==='started')f.sort((a,b)=>(b.startedAt||b.createdAt||0)-(a.startedAt||a.createdAt||0));

  const now=new Date();
  const yr=books.filter(b=>b.status==='finished'&&b.finishedAt&&new Date(b.finishedAt).getFullYear()===now.getFullYear()).length;
  const mo=books.filter(b=>b.status==='finished'&&b.finishedAt&&new Date(b.finishedAt).getFullYear()===now.getFullYear()&&new Date(b.finishedAt).getMonth()===now.getMonth()).length;
  const rd=books.filter(b=>b.status==='reading').length;
  document.getElementById('home-stats').innerHTML=`<div class="stat-chip"><strong>${yr}</strong> this year</div><div class="stat-chip"><strong>${mo}</strong> this month</div><div class="stat-chip"><strong>${rd}</strong> reading</div>`;
  document.getElementById('sort-btn').textContent=SORT_OPTIONS.find(s=>s.key===currentSort)?.label||'Sort';

  const grid=document.getElementById('book-grid'),empty=document.getElementById('empty-state');
  grid.innerHTML='';
  if(f.length===0){empty.style.display='flex';grid.style.display='none';empty.querySelector('p').textContent=books.length>0?'No books match.':'Your reading journey starts here.';return;}
  empty.style.display='none';grid.style.display='grid';
  f.forEach(book=>{
    const mood=book.entries?.length?book.entries[book.entries.length-1].emoji:'';
    const badge={want:'badge-want',reading:'badge-reading',finished:'badge-finished'}[book.status];
    const cat=book.category&&CATEGORIES[book.category]?CATEGORIES[book.category].label:'';
    const c=document.createElement('div');c.className='book-card';
    c.onclick=()=>{currentBookId=book.id;showView('detail');};
    c.innerHTML=`<div class="book-card-cover">${book.cover?`<img src="${esc(book.cover)}" alt="">`:'<span class="no-cover">&#x1f4d6;</span>'}<span class="book-card-badge ${badge}">${statusLabel(book.status)}</span>${cat?`<span class="book-card-cat">${esc(cat)}</span>`:''}</div><div class="book-card-info"><div class="book-card-title">${esc(book.title)||'Untitled'}</div><div class="book-card-author">${esc(book.author)||''}</div><div class="book-card-meta">${mood?`<span class="book-card-mood">${mood}</span>`:``}${book.rating?`<span class="book-card-rating">${book.rating}/10</span>`:''}</div></div>`;
    grid.appendChild(c);
  });
}
function setFilter(btn){document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=btn.dataset.f;renderHome();}
function cycleSort(){const i=SORT_OPTIONS.findIndex(s=>s.key===currentSort);currentSort=SORT_OPTIONS[(i+1)%SORT_OPTIONS.length].key;renderHome();}

/* Crop — draggable edges over the image */
let cropBox={x:0,y:0,w:0,h:0},cropActive=null,cropStartPt=null,cropStartBox=null,cropImgEl=null;
const CROP_RATIO=2/3; // width/height for book covers
const MIN_CROP=60;

function openCrop(dataURL){
  const img=document.getElementById('crop-img');
  img.onload=()=>{
    const iw=img.offsetWidth,ih=img.offsetHeight;
    // Default crop box centered, as large as possible at 2:3 ratio
    let bh=ih*0.85,bw=bh*CROP_RATIO;
    if(bw>iw*0.9){bw=iw*0.9;bh=bw/CROP_RATIO;}
    cropBox={x:(iw-bw)/2,y:(ih-bh)/2,w:bw,h:bh};
    updateCropBox();
    document.getElementById('crop-modal').classList.add('open');
  };
  img.src=dataURL;
  cropImgEl=img;
  // Set up drag listeners
  const area=document.getElementById('crop-area');
  area.onmousedown=cropOnStart;area.ontouchstart=cropOnStart;
  document.onmousemove=cropOnMove;document.ontouchmove=cropOnMove;
  document.onmouseup=cropOnEnd;document.ontouchend=cropOnEnd;
}

function updateCropBox(){
  const box=document.getElementById('crop-box');
  box.style.left=cropBox.x+'px';box.style.top=cropBox.y+'px';
  box.style.width=cropBox.w+'px';box.style.height=cropBox.h+'px';
}

function cropGetXY(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY};}

function cropOnStart(e){
  e.preventDefault();
  const target=e.target;
  const p=cropGetXY(e);
  cropStartPt=p;
  cropStartBox={...cropBox};
  if(target.dataset?.handle){
    cropActive=target.dataset.handle;
  }else if(target===document.getElementById('crop-box')||target.closest('#crop-box')){
    cropActive='move';
  }else{
    cropActive=null;
  }
}

function cropOnMove(e){
  if(!cropActive||!cropStartPt)return;
  e.preventDefault();
  const p=cropGetXY(e);
  const dx=p.x-cropStartPt.x,dy=p.y-cropStartPt.y;
  const img=document.getElementById('crop-img');
  const iw=img.offsetWidth,ih=img.offsetHeight;
  const sb=cropStartBox;

  if(cropActive==='move'){
    cropBox.x=Math.max(0,Math.min(iw-cropBox.w,sb.x+dx));
    cropBox.y=Math.max(0,Math.min(ih-cropBox.h,sb.y+dy));
  }else{
    // Handle resize — maintain 2:3 ratio
    let newW,newH,newX,newY;
    if(cropActive==='br'){
      newW=Math.max(MIN_CROP,sb.w+dx);newH=newW/CROP_RATIO;
      newX=sb.x;newY=sb.y;
    }else if(cropActive==='bl'){
      newW=Math.max(MIN_CROP,sb.w-dx);newH=newW/CROP_RATIO;
      newX=sb.x+sb.w-newW;newY=sb.y;
    }else if(cropActive==='tr'){
      newW=Math.max(MIN_CROP,sb.w+dx);newH=newW/CROP_RATIO;
      newX=sb.x;newY=sb.y+sb.h-newH;
    }else if(cropActive==='tl'){
      newW=Math.max(MIN_CROP,sb.w-dx);newH=newW/CROP_RATIO;
      newX=sb.x+sb.w-newW;newY=sb.y+sb.h-newH;
    }
    // Clamp to image bounds
    if(newX<0){newW+=newX;newH=newW/CROP_RATIO;newX=0;}
    if(newY<0){newH+=newY;newW=newH*CROP_RATIO;newY=Math.max(0,sb.y+sb.h-newH);}
    if(newX+newW>iw){newW=iw-newX;newH=newW/CROP_RATIO;}
    if(newY+newH>ih){newH=ih-newY;newW=newH*CROP_RATIO;}
    if(newW>=MIN_CROP&&newH>=MIN_CROP){cropBox={x:newX,y:newY,w:newW,h:newH};}
  }
  updateCropBox();
}

function cropOnEnd(){cropActive=null;cropStartPt=null;cropStartBox=null;}

function cancelCrop(){
  document.getElementById('crop-modal').classList.remove('open');
  document.onmousemove=null;document.ontouchmove=null;
  document.onmouseup=null;document.ontouchend=null;
}

function applyCrop(){
  const img=document.getElementById('crop-img');
  const scaleX=img.naturalWidth/img.offsetWidth;
  const scaleY=img.naturalHeight/img.offsetHeight;
  const sx=cropBox.x*scaleX,sy=cropBox.y*scaleY;
  const sw=cropBox.w*scaleX,sh=cropBox.h*scaleY;
  const canvas=document.createElement('canvas');
  canvas.width=400;canvas.height=600;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(img,sx,sy,sw,sh,0,0,400,600);
  tempCoverURL=canvas.toDataURL('image/jpeg',0.85);
  document.getElementById('cover-preview').src=tempCoverURL;
  document.getElementById('cover-preview').style.display='block';
  document.getElementById('cover-placeholder').style.display='none';
  cancelCrop();
}

function getBook(id){return books.find(b=>b.id===id);}
function renderDetail(){
  const b=getBook(currentBookId);if(!b)return;
  document.getElementById('detail-title').textContent=b.title||'Untitled';
  document.getElementById('detail-author').textContent=b.author||'';
  const cl=b.category&&CATEGORIES[b.category]?CATEGORIES[b.category].label:'';
  document.getElementById('detail-cat').textContent=cl+(b.subCategory?' / '+b.subCategory:'');
  // Dates
  let dates=[];
  if(b.createdAt)dates.push('Added '+shortDate(b.createdAt));
  if(b.startedAt)dates.push('Started '+shortDate(b.startedAt));
  if(b.finishedAt)dates.push('Finished '+shortDate(b.finishedAt));
  document.getElementById('detail-dates').textContent=dates.join(' · ');
  document.getElementById('detail-cover').innerHTML=b.cover?`<img src="${esc(b.cover)}" alt="">`:'<span class="no-cover">&#x1f4d6;</span>';
  document.querySelectorAll('#detail-status-row .pill').forEach(x=>x.classList.toggle('active',x.dataset.status===b.status));
  document.getElementById('detail-recommend').checked=!!b.recommend;
  document.getElementById('detail-recby').textContent=b.recommendedBy?'Recommended by '+b.recommendedBy:'';
  // Source
  renderDetailSource(b);
  // Rating
  renderRating(b);
  // Recommend banner
  renderRecommendBanner(b);
  renderJourney(b);
  document.getElementById('note-about').value=b.notes?.about||'';
  document.getElementById('note-final').value=b.notes?.final||'';
  document.getElementById('save-about').textContent='';
  document.getElementById('save-final').textContent='';
  document.getElementById('final-thoughts-group').style.display=b.status==='finished'?'':'none';
  document.getElementById('ai-section').style.display=b.status==='finished'?'':'none';
  if(b.status==='finished')renderAI(b);
}

function renderRating(b){
  const area=document.getElementById('rating-area');
  if(b.status!=='finished'){area.innerHTML='';return;}
  let dots='';for(let i=1;i<=10;i++){const cls=b.rating&&i<=b.rating?(b.rating>=6?'filled high':'filled'):'';dots+=`<div class="rating-dot ${cls}" onclick="setRating(${i})">${i}</div>`;}
  area.innerHTML=`<div class="rating-row"><span class="rating-label">Rating</span><div class="rating-dots">${dots}</div><span class="rating-value">${b.rating||'-'}</span></div>`;
}
async function setRating(n){const b=getBook(currentBookId);if(!b)return;b.rating=b.rating===n?null:n;renderRating(b);renderRecommendBanner(b);await apiSaveBook(b);}

function renderRecommendBanner(b){
  const area=document.getElementById('recommend-banner-area');
  if(b.rating&&b.rating>=6){area.innerHTML=`<div class="recommend-banner">This is a ${b.rating}/10 — you'd probably love more books like this! Try searching for similar titles in "${b.category&&CATEGORIES[b.category]?CATEGORIES[b.category].label:'this category'}".</div>`;}
  else area.innerHTML='';
}

/* === STATS === */
function renderStats(){
  const now=new Date(),year=now.getFullYear(),month=now.getMonth();
  const fin=books.filter(b=>b.status==='finished');
  const yr=fin.filter(b=>b.finishedAt&&new Date(b.finishedAt).getFullYear()===year);
  const mo=yr.filter(b=>new Date(b.finishedAt).getMonth()===month);
  const cc={};Object.keys(CATEGORIES).forEach(k=>cc[k]=0);yr.forEach(b=>{if(b.category&&cc[b.category]!==undefined)cc[b.category]++;});const mx=Math.max(1,...Object.values(cc));
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mc=Array(12).fill(0);yr.forEach(b=>mc[new Date(b.finishedAt).getMonth()]++);const mxM=Math.max(1,...mc);
  // Source breakdown
  const sc={};SOURCES.forEach(s=>sc[s]=0);yr.forEach(b=>{if(b.source&&sc[b.source]!==undefined)sc[b.source]++;});
  const srcHTML=SOURCES.filter(s=>sc[s]>0).map(s=>`<div class="cat-row"><span class="cat-label">${s}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${(sc[s]/Math.max(1,...Object.values(sc)))*100}%;background:var(--amber)"></div></div><span class="cat-count">${sc[s]}</span></div>`).join('');
  // Avg rating
  const rated=yr.filter(b=>b.rating);const avgR=rated.length?Math.round(rated.reduce((a,b)=>a+b.rating,0)/rated.length*10)/10:'-';

  document.getElementById('stats-content').innerHTML=`
    <div class="stat-card"><div class="stat-card-label">Books Finished This Year</div><div class="stat-card-value">${yr.length}</div><div class="stat-card-sub">${mo.length} this month · ${books.filter(b=>b.status==='reading').length} reading · Avg rating: ${avgR}</div></div>
    <div class="stat-card"><div class="stat-card-label">By Category (${year})</div><div class="cat-breakdown">${Object.entries(CATEGORIES).map(([k,c])=>`<div class="cat-row"><span class="cat-label">${c.label}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${(cc[k]/mx)*100}%;background:${c.color}"></div></div><span class="cat-count">${cc[k]}</span></div>`).join('')}</div></div>
    <div class="stat-card"><div class="stat-card-label">Month by Month (${year})</div><div class="cat-breakdown">${mc.map((c,i)=>i<=month?`<div class="cat-row"><span class="cat-label" style="width:40px">${mn[i]}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:${(c/mxM)*100}%;background:var(--amber)"></div></div><span class="cat-count">${c}</span></div>`:'').join('')}</div></div>
    ${srcHTML?`<div class="stat-card"><div class="stat-card-label">By Source (${year})</div><div class="cat-breakdown">${srcHTML}</div></div>`:''}
    <div class="stat-card"><div class="stat-card-label">Want to Read</div><div class="stat-card-value">${books.filter(b=>b.status==='want').length}</div></div>`;
}

/* === SHARE === */
function openShareModal(){const b=currentBookId?getBook(currentBookId):null;if(!b){toast('Open a book to share');return;}document.getElementById('share-title').textContent=b.title||'Untitled';document.getElementById('share-author').textContent=b.author||'';document.getElementById('share-moods').textContent=[...new Set((b.entries||[]).map(e=>e.emoji))].slice(-6).join(' ');document.getElementById('share-tag').textContent=statusLabel(b.status);document.getElementById('share-cover').innerHTML=b.cover?`<img src="${esc(b.cover)}" alt="">`:'<span style="font-size:2rem">&#x1f4d6;</span>';document.getElementById('share-modal').classList.add('open');}
function buildShareText(){const b=getBook(currentBookId);if(!b)return'';let t=`"${b.title}"${b.author?' by '+b.author:''}\n${statusLabel(b.status)}${b.rating?' — '+b.rating+'/10':''}${b.recommend?' | Recommended!':''}`;if(b.notes?.about)t+='\n\n'+b.notes.about;if(b.notes?.final)t+='\n\n'+b.notes.final;if(b.aiSummary)t+='\n\n---\n'+b.aiSummary;return t;}
function copyShare(){navigator.clipboard.writeText(buildShareText()).then(()=>{toast('Copied!');document.getElementById('share-modal').classList.remove('open');});}
function nativeShare(){const b=getBook(currentBookId);if(navigator.share)navigator.share({title:b?.title||'ReadThat.me',text:buildShareText()}).catch(()=>{});else copyShare();document.getElementById('share-modal').classList.remove('open');}

/* === UTILS === */
function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function shortDate(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

/* === VOICE INPUT === */
let activeRecognition=null,activeMicBtn=null;
function toggleMic(fieldId){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice input not supported in this browser');return;}
  const btn=event.currentTarget;
  // If already recording this field, stop
  if(activeRecognition&&activeMicBtn===btn){activeRecognition.stop();return;}
  // Stop any existing
  if(activeRecognition){activeRecognition.stop();}
  const recognition=new SR();
  recognition.continuous=true;recognition.interimResults=true;recognition.lang='en-US';
  const field=document.getElementById(fieldId);
  const startText=field.value;
  btn.classList.add('recording');activeMicBtn=btn;activeRecognition=recognition;
  recognition.onresult=e=>{
    let transcript='';
    for(let i=0;i<e.results.length;i++){transcript+=e.results[i][0].transcript;}
    field.value=startText+(startText?' ':'')+transcript;
    field.dispatchEvent(new Event('input'));
  };
  recognition.onend=()=>{btn.classList.remove('recording');if(activeMicBtn===btn){activeRecognition=null;activeMicBtn=null;}};
  recognition.onerror=()=>{btn.classList.remove('recording');activeRecognition=null;activeMicBtn=null;};
  recognition.start();
}

/* === INIT === */
document.addEventListener('click',e=>{if(!e.target.closest('.suggest-wrap'))document.getElementById('suggest-list').classList.remove('open');});
checkAuth();
</script>
